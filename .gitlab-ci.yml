# https://gitlab.bixilon.de/bixnet/ci/android

variables:
 ANDROID_SDK_VERSION: 36

stages:
  - build
  - test
  - package

.gradle:
  interruptible: true
  variables:
    GRADLE_USER_HOME: $CI_PROJECT_DIR/.home
    GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  cache:
    - key: "$CI_COMMIT_SHA"
      paths:
        - build
        - .gradle
    - key:
        files_commits:
          - "app/build.gradle.kts"
          - "build.gradle.kts"
          - "gradle.properties"
          - "gradle/libs.versions.toml"
      paths:
        - .home/caches
    - key:
        files_commits:
          - "gradle/wrapper/gradle-wrapper.properties"
      paths:
        - .home/wrapper

.jvm:
  image: azul/zulu-openjdk-alpine:21-latest
  extends: .gradle

.android:
  image: gitlab-registry.bixilon.de:443/bixnet/ci/android:$ANDROID_SDK_VERSION
  extends: .gradle

build:
  extends: .android
  stage: build
  script: ./gradlew --build-cache assembleDebug
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_MERGE_REQUEST_ID && $CI_MERGE_REQUEST_DRAFT == "false"'


test:
  extends: .jvm
  stage: test
  script: ./gradlew --build-cache :common:jvmTest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_MERGE_REQUEST_ID && $CI_MERGE_REQUEST_DRAFT == "false"'
  artifacts:
    when: always
    reports:
      junit: app/build/test-results/**/TEST-*.xml



package:
  extends: .android
  stage: package
  script: ./gradlew --build-cache assembleRelease
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_MERGE_REQUEST_ID && $CI_MERGE_REQUEST_DRAFT == "false"'
  artifacts:
    paths:
      - app/build/outputs/apk/release/app-release-unsigned.apk
    expire_in: 1 days
