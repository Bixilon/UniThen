query List_Postings($userID: ID!) {
    user_pk(userID: $userID) {
        id
        postings {
            id
            product {
                id
                resource {
                    ... on Course {
                        __typename
                        id
                        name
                        offer {
                            name
                        }
                        event {
                            id
                            name
                            start
                            end
                        }
                        tutors {
                            id
                            first_name
                            last_name
                        }
                        appointments {
                            id
                            start
                            end
                            canceledAt
                            tutors {
                                id
                                first_name
                                last_name
                            }
                            location {
                                __typename
                                ... on Area {
                                    name
                                }
                                ... on Location {
                                    name
                                }
                                ... on Room {
                                    name
                                    floor {
                                        building {
                                            name
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
    }
}
