query List_Postings($course: ID!) {
    courses_pk(id: $course) {
        __typename
        id
        name
        offer {
            name
        }
        event {
            id
            name
            start
            end
        }
        tutors {
            id
            first_name
            last_name
        }
        appointments {
            id
            start
            end
            canceledAt
            tutors {
                id
                first_name
                last_name
            }
            location {
                __typename
                ... on Area {
                    name
                }
                ... on Location {
                    name
                }
                ... on Room {
                    name
                    floor {
                        building {
                            name
                        }
                    }
                }
            }
        }
    }
}
